<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="targetGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="targetGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Target circles -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="url(#targetGradient1)" stroke-width="2"/>
  <circle cx="24" cy="24" r="15" fill="none" stroke="url(#targetGradient1)" stroke-width="2"/>
  <circle cx="24" cy="24" r="10" fill="none" stroke="url(#targetGradient2)" stroke-width="2"/>
  <circle cx="24" cy="24" r="5" fill="url(#targetGradient2)"/>

  <!-- Arrow hitting bullseye -->
  <g transform="translate(24, 24) rotate(-45)">
    <!-- Arrow shaft -->
    <rect x="-15" y="-1.5" width="18" height="3" fill="#EF4444" rx="1"/>

    <!-- Arrow head -->
    <path d="M5 0 L-1 -4 L-1 4 Z" fill="#DC2626"/>

    <!-- Arrow fletching -->
    <path d="M-15 -2 L-18 -4 L-16 0 Z" fill="#FCA5A5"/>
    <path d="M-15 2 L-18 4 L-16 0 Z" fill="#FCA5A5"/>
  </g>

  <!-- Impact effect -->
  <circle cx="24" cy="24" r="3" fill="#FEF3C7" opacity="0.6"/>

  <!-- Sparkle effects -->
  <g opacity="0.8">
    <path d="M38 12 L39 14 L41 13 L39 15 L40 17 L38 16 L36 17 L37 15 L35 13 L37 14 Z" fill="#FBBF24"/>
    <path d="M10 36 L11 37.5 L12.5 36.5 L11 38 L11.5 39.5 L10 38.5 L8.5 39.5 L9 38 L7.5 36.5 L9 37.5 Z" fill="#F59E0B"/>
  </g>
</svg>

<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5EEAD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left person (pink) -->
  <g transform="translate(12, 14)">
    <circle cx="0" cy="0" r="5" fill="url(#pinkGradient)"/>
    <ellipse cx="0" cy="10" rx="7" ry="5" fill="url(#pinkGradient)"/>
  </g>

  <!-- Right person (teal) -->
  <g transform="translate(36, 14)">
    <circle cx="0" cy="0" r="5" fill="url(#tealGradient)"/>
    <ellipse cx="0" cy="10" rx="7" ry="5" fill="url(#tealGradient)"/>
  </g>

  <!-- Center speech bubble (purple/blue) -->
  <g transform="translate(24, 30)">
    <!-- Main bubble shape -->
    <rect x="-9" y="-6" width="18" height="12" rx="3" fill="url(#purpleGradient)"/>

    <!-- Bubble tail pointing down-left -->
    <path d="M-4 6 L-6 10 L-2 7 Z" fill="url(#purpleGradient)"/>

    <!-- Speech lines inside bubble -->
    <line x1="-6" y1="-2" x2="6" y2="-2" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="-6" y1="2" x2="3" y2="2" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Connection dots/sparkles -->
  <circle cx="18" cy="22" r="1.5" fill="#F472B6" opacity="0.7"/>
  <circle cx="30" cy="22" r="1.5" fill="#5EEAD4" opacity="0.7"/>
  <circle cx="24" cy="18" r="1.5" fill="#A78BFA" opacity="0.9"/>
</svg>

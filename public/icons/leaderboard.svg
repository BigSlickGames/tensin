<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8B8B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bronzeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CD7F32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Bronze trophy (3rd place) -->
  <g transform="translate(32, 28)">
    <rect x="-6" y="8" width="12" height="4" rx="1" fill="url(#bronzeGradient)"/>
    <path d="M-4 8 L-4 2 Q-4 0 -2 0 L2 0 Q4 0 4 2 L4 8 Z" fill="url(#bronzeGradient)"/>
    <circle cx="0" cy="-2" r="3" fill="#8B4513"/>
    <path d="M-6 2 Q-8 2 -8 4 L-8 6 L-4 6 L-4 4 Z" fill="url(#bronzeGradient)"/>
    <path d="M6 2 Q8 2 8 4 L8 6 L4 6 L4 4 Z" fill="url(#bronzeGradient)"/>
  </g>

  <!-- Silver trophy (2nd place) -->
  <g transform="translate(24, 20)">
    <rect x="-7" y="10" width="14" height="5" rx="1" fill="url(#silverGradient)"/>
    <path d="M-5 10 L-5 3 Q-5 0 -2 0 L2 0 Q5 0 5 3 L5 10 Z" fill="url(#silverGradient)"/>
    <circle cx="0" cy="-1" r="4" fill="#C0C0C0"/>
    <path d="M-7 3 Q-10 3 -10 6 L-10 8 L-5 8 L-5 5 Z" fill="url(#silverGradient)"/>
    <path d="M7 3 Q10 3 10 6 L10 8 L5 8 L5 5 Z" fill="url(#silverGradient)"/>
  </g>

  <!-- Gold trophy (1st place) -->
  <g transform="translate(16, 12)">
    <rect x="-8" y="12" width="16" height="6" rx="1.5" fill="url(#goldGradient)"/>
    <path d="M-6 12 L-6 4 Q-6 0 -3 0 L3 0 Q6 0 6 4 L6 12 Z" fill="url(#goldGradient)"/>
    <circle cx="0" cy="0" r="5" fill="#FFD700"/>
    <polygon points="0,-3 0.9,-0.9 3,0 0.9,0.9 0,3 -0.9,0.9 -3,0 -0.9,-0.9" fill="#FFF" opacity="0.8"/>
    <path d="M-8 4 Q-11 4 -11 7 L-11 10 L-6 10 L-6 6 Z" fill="url(#goldGradient)"/>
    <path d="M8 4 Q11 4 11 7 L11 10 L6 10 L6 6 Z" fill="url(#goldGradient)"/>
  </g>

  <!-- Podium base -->
  <rect x="8" y="36" width="32" height="2" rx="1" fill="#555" opacity="0.3"/>
</svg>

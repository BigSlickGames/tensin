<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tensins World - Admin Dashboard</title>
  <link rel="stylesheet" href="/styles/master.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    #admin-container {
      width: 100vw;
      height: 100vh;
      overflow: auto;
    }

    .admin-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 18px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div id="admin-container">
    <div class="admin-loading">
      Loading Admin Dashboard...
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.57.4';

    const supabaseUrl = import.meta.env.VITE_SUPABASE_URL || '';
    const supabaseAnonKey = import.meta.env.VITE_SUPABASE_ANON_KEY || '';

    window.supabase = createClient(supabaseUrl, supabaseAnonKey);

    async function checkAdminAuth() {
      const { data: { session } } = await window.supabase.auth.getSession();

      if (!session) {
        showLoginPage();
        return false;
      }

      const { data: profile } = await window.supabase
        .from('user_profiles')
        .select('is_admin')
        .eq('id', session.user.id)
        .single();

      if (!profile?.is_admin) {
        showAccessDenied();
        return false;
      }

      return true;
    }

    function showLoginPage() {
      const container = document.getElementById('admin-container');
      container.innerHTML = `
        <div style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
          padding: 20px;
        ">
          <div style="
            width: 100%;
            max-width: 400px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-glow);
            border-radius: var(--radius-lg);
            padding: 40px;
          ">
            <div style="text-align: center; margin-bottom: 32px;">
              <h1 style="font-size: 28px; font-weight: 900; color: var(--text-primary); margin-bottom: 8px;">
                Admin Dashboard
              </h1>
              <p style="color: var(--text-secondary); font-size: 14px;">
                Sign in with admin credentials
              </p>
            </div>

            <form id="admin-login-form">
              <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; font-size: 14px; color: var(--text-primary);">
                  Email
                </label>
                <input
                  type="email"
                  id="admin-email"
                  required
                  style="
                    width: 100%;
                    padding: 12px;
                    background: var(--bg-tertiary);
                    border: 2px solid var(--border-subtle);
                    border-radius: var(--radius-md);
                    color: var(--text-primary);
                    font-size: 14px;
                  "
                />
              </div>

              <div style="margin-bottom: 24px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; font-size: 14px; color: var(--text-primary);">
                  Password
                </label>
                <input
                  type="password"
                  id="admin-password"
                  required
                  style="
                    width: 100%;
                    padding: 12px;
                    background: var(--bg-tertiary);
                    border: 2px solid var(--border-subtle);
                    border-radius: var(--radius-md);
                    color: var(--text-primary);
                    font-size: 14px;
                  "
                />
              </div>

              <div id="admin-error" style="
                display: none;
                padding: 12px;
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid rgba(239, 68, 68, 0.3);
                border-radius: var(--radius-md);
                color: #ef4444;
                font-size: 14px;
                margin-bottom: 16px;
              "></div>

              <button
                type="submit"
                style="
                  width: 100%;
                  padding: 14px;
                  background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
                  border: none;
                  border-radius: var(--radius-md);
                  color: white;
                  font-size: 16px;
                  font-weight: 800;
                  cursor: pointer;
                  transition: all 0.2s;
                "
                onmouseover="this.style.opacity='0.9'"
                onmouseout="this.style.opacity='1'"
              >
                Sign In
              </button>
            </form>
          </div>
        </div>
      `;

      document.getElementById('admin-login-form').addEventListener('submit', handleLogin);
    }

    async function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;
      const errorDiv = document.getElementById('admin-error');

      const { data, error } = await window.supabase.auth.signInWithPassword({
        email,
        password,
      });

      if (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        return;
      }

      const { data: profile } = await window.supabase
        .from('user_profiles')
        .select('is_admin')
        .eq('id', data.user.id)
        .single();

      if (!profile?.is_admin) {
        errorDiv.textContent = 'Access denied. Admin privileges required.';
        errorDiv.style.display = 'block';
        await window.supabase.auth.signOut();
        return;
      }

      window.location.reload();
    }

    function showAccessDenied() {
      const container = document.getElementById('admin-container');
      container.innerHTML = `
        <div style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: var(--bg-primary);
          padding: 20px;
        ">
          <div style="text-align: center;">
            <h1 style="font-size: 48px; margin-bottom: 16px;">🚫</h1>
            <h2 style="font-size: 24px; font-weight: 900; color: var(--text-primary); margin-bottom: 8px;">
              Access Denied
            </h2>
            <p style="color: var(--text-secondary); margin-bottom: 24px;">
              You don't have permission to access this page.
            </p>
            <button
              onclick="window.location.href='/'"
              style="
                padding: 12px 24px;
                background: var(--border-glow);
                border: none;
                border-radius: var(--radius-md);
                color: var(--text-primary);
                font-weight: 700;
                cursor: pointer;
              "
            >
              Return Home
            </button>
          </div>
        </div>
      `;
    }

    async function loadAdminDashboard() {
      const isAdmin = await checkAdminAuth();
      if (!isAdmin) return;

      const { default: adminModule } = await import('/app/adminDashboard.js');
      const container = document.getElementById('admin-container');
      await adminModule.start(container);
    }

    loadAdminDashboard();
  </script>
</body>
</html>
